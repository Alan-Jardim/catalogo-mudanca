*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f5f5;color:#333}
.header{background:linear-gradient(135deg,#2c3e50,#3498db);color:#fff;padding:20px;text-align:center}
.header h1{font-size:1.8em;margin-bottom:5px}
.header p{opacity:.85;font-size:.95em}
.controls{background:#fff;padding:15px 20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;box-shadow:0 2px 4px rgba(0,0,0,.1);position:sticky;top:0;z-index:10}
.controls input,.controls select{padding:10px 15px;border:1px solid #ddd;border-radius:8px;font-size:.95em}
.controls input{flex:1;min-width:200px;max-width:400px}
.cat-section{max-width:1200px;margin:0 auto;padding:0 20px}
.cat-title{background:linear-gradient(135deg,#1d3557,#457b9d);color:#fff;padding:14px 20px;margin:25px 0 15px;border-radius:10px;font-size:1.15em;font-weight:700;display:flex;align-items:center;gap:10px;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.cat-title .cat-icon{font-size:1.3em}
.cat-title .cat-count{background:rgba(255,255,255,.2);padding:2px 10px;border-radius:12px;font-size:.8em;margin-left:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;max-width:1200px;margin:0 auto;padding:0 20px 20px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);box-shadow:0 4px 16px rgba(0,0,0,.15)}
.card-body{padding:15px;flex:1;display:flex;flex-direction:column}
.card-body h3{font-size:1.1em;margin-bottom:8px;color:#2c3e50}
.card-body .desc{font-size:.85em;color:#666;margin-bottom:10px;flex:1}
.card-body .price{font-size:1.4em;font-weight:700;color:#e74c3c}
.card-body .ref{font-size:.75em;color:#999;margin-top:3px}
.card-body .cat-badge{display:inline-block;background:#ecf0f1;color:#7f8c8d;padding:3px 10px;border-radius:12px;font-size:.75em;margin-bottom:8px}
.card-body .estado-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.75em;margin-left:5px}
.estado-bom{background:#d4edda;color:#155724}
.estado-medio{background:#fff3cd;color:#856404}
.estado-ruim{background:#f8d7da;color:#721c24}
.btn-internet{display:inline-block;margin-top:10px;background:#ff9900;color:#111;font-weight:700;text-decoration:none;padding:8px 16px;border-radius:6px;font-size:.85em;transition:.2s;text-align:center}
.btn-internet:hover{background:#e68a00;color:#000}
.num-badge{background:#3498db;color:#fff;display:inline-block;width:28px;height:28px;line-height:28px;text-align:center;border-radius:50%;font-size:.8em;font-weight:700;margin-right:8px;vertical-align:middle}
.footer{text-align:center;padding:20px;color:#999;font-size:.8em}
.no-results{text-align:center;padding:40px;color:#999;font-size:1.1em;grid-column:1/-1}
.summary{text-align:center;padding:10px;background:#eaf2f8;color:#2c3e50;font-size:.9em}
@media(max-width:600px){.grid{grid-template-columns:1fr;padding:0 10px 10px}.header h1{font-size:1.3em}.cat-section{padding:0 10px}}
</style>

const catIcons={"Eletrodomésticos":"🏠","Eletrônicos":"📺","Bebê/Infantil":"👶","Móveis":"🪑","Cozinha":"🍳","Academia":"💪","Diversos":"📦"};
function fmt(v){return'R$ '+v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function estadoClass(e){if(e==='bom'||e==='boa')return'estado-bom';if(e.includes('méd')||e.includes('med'))return'estado-medio';if(e==='ruim')return'estado-ruim';return'estado-bom';}
function estadoLabel(e){if(e==='bom'||e==='boa')return'Bom estado';if(e.includes('méd')||e.includes('med'))return'Estado médio';if(e==='ruim')return'Estado ruim';return e||'Bom estado';}
function renderCard(it){
let refText=it.tipo_ref==='NOVO'?'Ref. novo: '+fmt(it.preco_ref):'Ref. usado: '+fmt(it.preco_ref);
let linkHtml=it.link?'<a class="btn-internet" href="'+(it.link.startsWith('http')?it.link:'https://'+it.link)+'" target="_blank">Ver na Internet</a>':'';
return'<div class="card"><div class="card-body">'
+'<div><span class="num-badge">'+it.num+'</span>'
+'<span class="cat-badge">'+it.cat+'</span>'
+'<span class="estado-badge '+estadoClass(it.estado)+'">'+estadoLabel(it.estado)+'</span></div>'
+'<h3>'+it.nome+'</h3>'
+'<div class="desc">'+it.desc+'</div>'
+'<div class="price">'+fmt(it.pv)+'</div>'
+'<div class="ref">'+refText+'</div>'
+linkHtml
+'</div></div>';
}
function renderItems(list){
const container=document.getElementById('content');
const sum=document.getElementById('summary');
if(list.length===0){container.innerHTML='<div class="grid"><div class="no-results">Nenhum item encontrado</div></div>';sum.textContent='';return;}
let total=list.reduce((a,b)=>a+b.pv,0);
sum.textContent=list.length+' itens · Valor total: '+fmt(total);
// Group by category
let groups={};
let catOrder=[];
list.forEach(it=>{
let c=it.cat||'Outros';
if(!groups[c]){groups[c]=[];catOrder.push(c);}
groups[c].push(it);
});
let html='';
catOrder.forEach(cat=>{
let icon=catIcons[cat]||'📦';
let items=groups[cat];
html+='<div class="cat-section">';
html+='<div class="cat-title"><span class="cat-icon">'+icon+'</span>'+cat+'<span class="cat-count">'+items.length+(items.length===1?' item':' itens')+'</span></div>';
html+='</div>';
html+='<div class="grid">';
items.forEach(it=>{html+=renderCard(it);});
html+='</div>';
});
container.innerHTML=html;
}
function filterItems(){
let q=document.getElementById('search').value.toLowerCase();
let c=document.getElementById('catFilter').value;
let f=items.filter(it=>{
let match=true;
if(q)match=(it.nome+' '+it.desc+' '+it.cat).toLowerCase().includes(q);
if(c)match=match&&it.cat===c;
return match;
});
renderItems(f);
}
renderItems(items);
</script>

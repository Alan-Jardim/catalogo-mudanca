        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        /* Summary Bar */
        .summary-bar {
            background: white;
            padding: 20px;
            margin: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .summary-item {
            text-align: center;
        }

        .summary-item-value {
            font-size: 2em;
            font-weight: 700;
            color: #2c3e50;
        }

        .summary-item-label {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-top: 5px;
        }

        /* Controls Container */
        .controls-container {
            position: sticky;
            top: 0;
            background: white;
            padding: 15px 20px;
            margin: 0 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 100;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.2);
        }

        .filter-select {
            padding: 10px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            background-color: white;
            transition: border-color 0.3s;
        }

        .filter-select:focus {
            outline: none;
            border-color: #3498db;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        /* Section */
        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.8em;
            color: #2c3e50;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid #3498db;
        }

        /* Category Group */
        .category-group {
            margin-bottom: 30px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            border-left: none;
            color: #fff;
        }

        .category-emoji {
            font-size: 1.8em;
        }

        .category-name {
            font-size: 1.3em;
            font-weight: 600;
            color: #fff;
            flex: 1;
        }

        .category-badge {
            background-color: rgba(255,255,255,0.25);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        /* Grid */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        /* Card */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .card-header {
            padding: 15px;
            border-bottom: 1px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-number {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #3498db;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 0.9em;
            flex-shrink: 0;
        }

        .card-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex: 1;
            justify-content: flex-end;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-category {
            background-color: #ecf0f1;
            color: #2c3e50;
        }

        .badge-state {
            background-color: #27ae60;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7em;
            font-weight: 500;
            white-space: nowrap;
        }

        .badge-state.medio {
            background-color: #f39c12;
        }

        .badge-state.ruim {
            background-color: #e74c3c;
        }

        .card-content {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-content h3 {
            font-size: 1.1em;
            color: #2c3e50;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .card-content p {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 12px;
            flex: 1;
            line-height: 1.4;
        }

        .card-footer {
            padding: 15px;
            border-top: 1px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-price {
            font-size: 1.3em;
            font-weight: 700;
            color: #e74c3c;
        }

        .card-price.pending {
            color: #f39c12;
        }

        .card-price.sold {
            color: #95a5a6;
            text-decoration: line-through;
        }

        /* VENDIDO Overlay */
        .card.sold {
            opacity: 0.85;
        }

        .card.sold::before {
            content: 'VENDIDO';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-35deg);
            font-size: 3em;
            font-weight: 900;
            color: rgba(231, 76, 60, 0.4);
            white-space: nowrap;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 2px;
        }

        
        /* Card Image */
        .card-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover .card-image img {
            transform: scale(1.05);
        }

        .card-image .no-image {
            color: #bdc3c7;
            font-size: 3em;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #7f8c8d;
            font-size: 0.95em;
            margin-top: 40px;
            border-top: 1px solid #ecf0f1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .controls-container {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                min-width: auto;
            }

            .filter-select {
                width: 100%;
            }

            .items-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }

            .summary-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Hidden class for filtering */
        .hidden {
            display: none;
        }
    </style>

        // Category emojis
        const categoryEmojis = {
            "Academia": "💪",
            "Bebê/Infantil": "👶",
            "Cozinha": "🍳",
            "Diversos": "📦",
            "Eletrodomésticos": "🏠",
            "Eletrônicos": "📺",
            "Móveis": "🪑",
            "Pet": "🐾"
        };

        // Category colors
        const categoryColors = {
            "Academia": "#4CAF50",
            "Bebê/Infantil": "#FF9800",
            "Cozinha": "#2196F3",
            "Diversos": "#9C27B0",
            "Eletrodomésticos": "#F44336",
            "Eletrônicos": "#00BCD4",
            "Móveis": "#FFC107",
            "Pet": "#E91E63"
        };

        // Filter items by section
        function filterItemsBySection(section) {
            if (section === 'priced') {
                return items.filter(item => item.ok === true && item.vendido === false);
            } else if (section === 'pending') {
                return items.filter(item => item.ok === false && item.vendido === false);
            } else if (section === 'sold') {
                return items.filter(item => item.vendido === true);
            }
            return [];
        }

        // Get state badge class
        function getStateBadgeClass(estado) {
            if (estado === 'Bom' || estado === 'Boa') return 'badge-state';
            if (estado === 'Médio' || estado === 'Média') return 'badge-state medio';
            if (estado === 'Ruim') return 'badge-state ruim';
            return 'badge-state';
        }

        // Create card HTML
        function createCard(item) {
            const isSold = item.vendido;
            const cardClass = isSold ? 'card sold' : 'card';

            let stateHtml = '';
            if (item.estado) {
                stateHtml = `<span class="${getStateBadgeClass(item.estado)}">Estado do item: ${item.estado}</span>`;
            }

            let priceClass = 'card-price';
            if (item.price === 'Preço a ser definido') {
                priceClass += ' pending';
            } else if (item.vendido) {
                priceClass += ' sold';
            }

            let fotoHtml = '';
            if (item.foto) {
                fotoHtml = `<div class="card-image"><img src="${item.foto}" alt="${item.nome}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\'no-image\'>📷</span>'"></div>`;
            } else {
                fotoHtml = `<div class="card-image"><span class="no-image">📷</span></div>`;
            }

            return `
                <div class="${cardClass}">
                    ${fotoHtml}
                    <div class="card-header">
                        <div class="card-number">${item.num}</div>
                        <div class="card-badges">
                            <span class="badge badge-category">${item.cat}</span>
                            ${stateHtml}
                        </div>
                    </div>
                    <div class="card-content">
                        <h3>${item.nome}</h3>
                        <p>${item.desc}</p>
                    </div>
                    <div class="card-footer">
                        <span class="${priceClass}">${item.price}</span>
                    </div>
                </div>
            `;
        }

        // Group items by category
        function groupByCategory(items) {
            const grouped = {};
            items.forEach(item => {
                if (!grouped[item.cat]) {
                    grouped[item.cat] = [];
                }
                grouped[item.cat].push(item);
            });
            return grouped;
        }

        // Render section
        function renderSection(sectionId, contentId, filterFunc, displayNone = false) {
            const sectionItems = filterFunc();
            const container = document.getElementById(contentId);

            if (sectionItems.length === 0) {
                document.getElementById(sectionId).style.display = displayNone ? 'none' : 'block';
                container.innerHTML = '<p style="text-align: center; color: #95a5a6; padding: 20px;">Nenhum item nesta seção</p>';
                return;
            }

            const grouped = groupByCategory(sectionItems);
            let html = '';

            // Sort categories
            const sortedCategories = Object.keys(grouped).sort();

            sortedCategories.forEach(cat => {
                const catItems = grouped[cat];
                const emoji = categoryEmojis[cat] || '';
                const catColor = categoryColors[cat] || '#666';

                html += `
                    <div class="category-group">
                        <div class="category-header" style="background-color: ${catColor};">
                            <span class="category-emoji">${emoji}</span>
                            <span class="category-name">${cat}</span>
                            <span class="category-badge">${catItems.length} item${catItems.length !== 1 ? 's' : ''}</span>
                        </div>
                        <div class="items-grid">
                            ${catItems.map(item => createCard(item)).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Update summary
        function updateSummary() {
            const totalItems = items.length;
            const pricedItems = items.filter(i => i.ok === true && i.vendido === false).length;
            const pendingItems = items.filter(i => i.ok === false && i.vendido === false).length;
            const soldItems = items.filter(i => i.vendido === true).length;

            document.getElementById('total-count').textContent = totalItems;
            document.getElementById('priced-count').textContent = pricedItems;
            document.getElementById('pending-count').textContent = pendingItems;
            document.getElementById('sold-count').textContent = soldItems;
        }

        // Filter and render
        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const selectedCategory = document.getElementById('category-filter').value;

            let filteredItems = items.filter(item => {
                const matchesSearch = item.nome.toLowerCase().includes(searchTerm) ||
                                     item.desc.toLowerCase().includes(searchTerm);
                const matchesCategory = selectedCategory === '' || item.cat === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            // Split into sections
            const pricedItems = filteredItems.filter(i => i.ok === true && i.vendido === false);
            const pendingItems = filteredItems.filter(i => i.ok === false && i.vendido === false);
            const soldItems = filteredItems.filter(i => i.vendido === true);

            // Render each section
            renderSection('priced-section', 'priced-content', () => pricedItems, pricedItems.length === 0);
            renderSection('pending-section', 'pending-content', () => pendingItems, pendingItems.length === 0);
            renderSection('sold-section', 'sold-content', () => soldItems, soldItems.length === 0);
        }

        // Event listeners
        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('category-filter').addEventListener('change', applyFilters);

        // Initialize
        updateSummary();
        applyFilters();
    </script>

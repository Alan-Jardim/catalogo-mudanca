        /* Header */
        .header {

            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        /* Summary Bar */
        .summary-bar {
            background: white;
            padding: 20px;
            margin: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .summary-item {
            text-align: center;
        }

        .summary-item-value {
            font-size: 2em;
            font-weight: 700;
            color: #2c3e50;
        }

        .summary-item-label {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-top: 4px;
        }

        /* Controls */
        .controls-container {
            display: flex;
            gap: 15px;
            padding: 0 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            border-color: #3498db;
            outline: none;
        }

        .filter-select {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            background: white;
            cursor: pointer;
            min-width: 200px;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Section */
        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.4em;
            font-weight: 700;
            color: #2c3e50;
            padding: 15px 0;
            border-bottom: 3px solid #3498db;
            margin-bottom: 20px;
        }

        /* Category */
        .category-group {
            margin-bottom: 25px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .category-emoji {
            font-size: 1.3em;
        }

        .category-name {
            font-size: 1.1em;
        }

        .category-badge {
            margin-left: auto;
            background: rgba(255,255,255,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }

        /* Grid */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Card */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .card.sold {
            opacity: 0.65;
        }

        .card-image {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            overflow: hidden;
            position: relative;
        }

            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            pointer-events: none;
        }

            color: rgba(231, 76, 60, 0.7);
            font-size: 2.2em;
            font-weight: 900;
            letter-spacing: 6px;
            transform: rotate(-30deg);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.15);
            border: 4px solid rgba(231, 76, 60, 0.5);
            padding: 4px 24px;
            border-radius: 8px;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 8px;
        }

        .no-image {
            font-size: 3em;
            opacity: 0.3;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px 0;
        }

        .card-number {
            background: #2c3e50;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: 700;
            flex-shrink: 0;
        }

        .card-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
        }

        .badge-category {
            background: #e8f4fd;
            color: #2196F3;
        }

        .badge-state {
            background: #e8f5e9;
            color: #388E3C;
        }

        .badge-state.medio {
            background: #fffde7;
            color: #F9A825;
        }

        .badge-state.ruim {
            background: #ffebee;
            color: #D32F2F;
        }

        .card-content {
            padding: 12px 16px;
        }

        .card-content h3 {
            font-size: 1em;
            margin-bottom: 6px;
            color: #2c3e50;
        }

        .card-content p {
            font-size: 0.85em;
            color: #7f8c8d;
            line-height: 1.4;
        }

        .card-footer {
            padding: 12px 16px;
            border-top: 1px solid #f0f0f0;
        }

        .card-price {
            font-size: 1.15em;
            font-weight: 700;
            color: #27ae60;
        }

        .card-price.pending {
            color: #e67e22;
            font-size: 0.9em;
        }

        .card-price.sold {
            color: #e74c3c;
            text-decoration: line-through;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #95a5a6;
            font-size: 0.9em;
            margin-top: 40px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

                width: 100%;
            }

            }

            .summary-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .hidden {
            display: none;
        }

        // Category emojis
        const categoryEmojis = {
            "Academia": "💪",
            "Bebê/Infantil": "👶",
            "Cozinha": "🍳",
            "Decoração": "🎨",
            "Diversos": "📦",
            "Eletrodomésticos": "🏠",
            "Eletrônicos": "📺",
            "Móveis": "🪑",
            "Pet": "🐾"
        };

        // Category colors
        const categoryColors = {
            "Academia": "#4CAF50",
            "Bebê/Infantil": "#FF9800",
            "Cozinha": "#2196F3",
            "Decoração": "#8D6E63",
            "Diversos": "#9C27B0",
            "Eletrodomésticos": "#F44336",
            "Eletrônicos": "#00BCD4",
            "Móveis": "#FFC107",
            "Pet": "#E91E63"
        };

        // Filter items by section
        function filterItemsBySection(section) {
            if (section === 'priced') {
                return items.filter(item => item.hasPrice === true && item.vendido === false);
            } else if (section === 'pending') {
                return items.filter(item => item.hasPrice === false && item.vendido === false);
            } else if (section === 'sold') {
                return items.filter(item => item.vendido === true);
            }
            return [];
        }

        // Get state badge class
        function getStateBadgeClass(estado) {
            if (estado === 'Bom' || estado === 'Boa') return 'badge badge-state';
            if (estado === 'Regular') return 'badge badge-state medio';
            if (estado === 'Ruim') return 'badge badge-state ruim';
            return 'badge badge-state';
        }

        // Helper: image load error fallback
        function imgError(img) {
            img.parentElement.innerHTML = '<span class="no-image">📷</span>';
        }

        // Create card HTML
        function createCard(item) {
            const isSold = item.vendido;
            const isReserved = item.reservado === true || (!isSold && item.price === 'RESERVADO');
            const cardClass = isSold ? 'card sold' : (isReserved ? 'card reserved' : 'card');

            let stateHtml = '';
            if (item.estado) {
                stateHtml = `<span class="${getStateBadgeClass(item.estado)}">Estado do item: ${item.estado}</span>`;
            }

            let priceClass = 'card-price';
            if (item.price === 'Preço a ser definido') {
                priceClass += ' pending';
            } else if (item.vendido) {
                priceClass += ' sold';
            }

            let soldOverlay = isSold
                ? '<div class="sold-overlay"><span>VENDIDO</span></div>'
                : (isReserved ? '<div class="reserved-overlay"><span>RESERVADO</span></div>' : '');
            let fotoHtml = '';
            if (item.foto) {
                fotoHtml = `<div class="card-image">${soldOverlay}<img src="${item.foto}" alt="${item.nome}" loading="lazy" onerror="imgError(this)"></div>`;
            } else {
                fotoHtml = `<div class="card-image">${soldOverlay}<span class="no-image">📷</span></div>`;
            }

            return `
                <div class="${cardClass}">
                    ${fotoHtml}
                    <div class="card-header">
                        <div class="card-number">${item.num}</div>
                        <div class="card-badges">
                            <span class="badge badge-category">${item.cat}</span>
                            ${stateHtml}
                        </div>
                    </div>
                    <div class="card-content">
                        <h3>${item.nome}</h3>
                        <p>${item.desc}</p>
                    </div>
                    <div class="card-footer">
                        <span class="${priceClass}">${item.price}</span>
                    </div>
                </div>
            `;
        }

        // Group items by category
        function groupByCategory(items) {
            const grouped = {};
            items.forEach(item => {
                if (!grouped[item.cat]) {
                    grouped[item.cat] = [];
                }
                grouped[item.cat].push(item);
            });
            return grouped;
        }

        // Render section
        function renderSection(sectionId, contentId, filterFunc, displayNone = false) {
            const sectionItems = filterFunc();
            const container = document.getElementById(contentId);

            if (sectionItems.length === 0) {
                document.getElementById(sectionId).style.display = displayNone ? 'none' : 'block';
                container.innerHTML = '<p style="text-align: center; color: #95a5a6; padding: 20px;">Nenhum item nesta seção</p>';
                return;
            }

            const grouped = groupByCategory(sectionItems);
            let html = '';

            // Sort categories
            const sortedCategories = Object.keys(grouped).sort();

            sortedCategories.forEach(cat => {
                const catItems = grouped[cat];
                const emoji = categoryEmojis[cat] || '';
                const catColor = categoryColors[cat] || '#666';

                html += `
                    <div class="category-group">
                        <div class="category-header" style="background-color: ${catColor};">
                            <span class="category-emoji">${emoji}</span>
                            <span class="category-name">${cat}</span>
                            <span class="category-badge">${catItems.length} item${catItems.length !== 1 ? 's' : ''}</span>
                        </div>
                        <div class="items-grid">
                            ${catItems.map(item => createCard(item)).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Update summary
        function updateSummary() {
            var totalItems = items.length;
            var vendidoItems = items.filter(function(i) { return i.vendido === true; }).length;
            var reservadoItems = items.filter(function(i) { return i.reservado === true || (!i.vendido && i.price === 'RESERVADO'); }).length;
            var livreItems = items.filter(function(i) { return !i.vendido && i.reservado !== true && i.price !== 'RESERVADO'; }).length;
            document.getElementById('total-count').textContent = totalItems;
            document.getElementById('vendido-count').textContent = vendidoItems;
            document.getElementById('reservado-count').textContent = reservadoItems;
            document.getElementById('livre-count').textContent = livreItems;
        }

        // Filter and render
        function applyFilters() {
            var searchTerm = document.getElementById('search-input').value.toLowerCase();
            var selectedCategory = document.getElementById('category-filter').value;
            var filteredItems = items.filter(function(item) {
                var matchesSearch = item.nome.toLowerCase().indexOf(searchTerm) >= 0 ||
                                    item.desc.toLowerCase().indexOf(searchTerm) >= 0;
                var matchesCategory = selectedCategory === '' || item.cat === selectedCategory;
                return matchesSearch && matchesCategory;
            });
            renderSection('all-section', 'all-content', function() { return filteredItems; }, filteredItems.length === 0);
        }

        // Event listeners
        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('category-filter').addEventListener('change', applyFilters);

        // Initialize
        updateSummary();
        applyFilters();
    </script>
